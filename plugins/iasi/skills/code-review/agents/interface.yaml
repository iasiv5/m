interface:
  display_name: "Code Review 代码审查"
  short_description: "对代码、PR 或提交进行结构化审查并给出重点反馈"
  default_prompt: "使用 $code-review 审查这次代码或变更，优先指出 bug、风险、行为回归和测试缺口。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"